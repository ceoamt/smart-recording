<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Recording – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3347;
      --accent:  #5b6af0;
      --accent2: #7c89ff;
      --text:    #e4e6f0;
      --muted:   #7a7f9a;
      --red:     #e05252;
      --radius:  12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { color: #fff; }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .logo-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -.4px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #12141e;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .password-wrap {
      position: relative;
    }
    .password-wrap input { padding-right: 42px; margin-bottom: 18px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 11px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0; line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      margin-top: 4px;
    }
    .btn:hover   { background: var(--accent2); }
    .btn:active  { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: default; }

    .error-msg {
      background: rgba(224,82,82,.1);
      border: 1px solid rgba(224,82,82,.35);
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Smart Recording</div>
        <div class="logo-sub">by AMT Italia</div>
      </div>
    </div>

    <h1>Accedi</h1>
    <p class="subtitle">Inserisci le tue credenziali per continuare</p>

    <form id="login-form" autocomplete="on">
      <div id="error-msg" class="error-msg">Credenziali non valide. Riprova.</div>

      <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="es. amtitalia" autocomplete="username" required />
      </div>

      <div>
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="toggle-pw" title="Mostra/nascondi password">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="submit-btn">Accedi</button>
    </form>

    <div class="footer">Smart Recording © 2026 – AMT Italia</div>
  </div>

  <script>
    const form      = document.getElementById('login-form');
    const errMsg    = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const togglePw  = document.getElementById('toggle-pw');
    const pwInput   = document.getElementById('password');
    const eyeIcon   = document.getElementById('eye-icon');

    // Toggle visibilità password
    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errMsg.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Accesso in corso…';

      const username = document.getElementById('username').value.trim();
      const password = pwInput.value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          errMsg.classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Accedi';
        }
      } catch {
        errMsg.textContent = 'Errore di rete. Controlla la connessione.';
        errMsg.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Accedi';
      }
    });
  </script>
</body>
</html>
